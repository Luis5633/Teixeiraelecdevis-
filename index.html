<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEIXIRAELEC</title>

<style>
body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

header{
background:black;
color:#FFD700;
padding:20px;
text-align:center;
font-size:24px;
font-weight:bold;
}

section{
background:white;
margin:15px;
padding:20px;
border-radius:12px;
}

button{
background:#FFD700;
border:none;
padding:12px;
margin:6px;
border-radius:8px;
font-weight:bold;
width:100%;
}

input{
width:100%;
padding:10px;
margin:5px 0;
}

table{
width:100%;
border-collapse:collapse;
}

td,th{
border:1px solid #ddd;
padding:8px;
}

</style>

</head>

<body>

<header>
TEIXIRAELEC
</header>

<section>

<h2>Nouveau devis</h2>

<input placeholder="Nom client" id="client">

<input placeholder="Téléphone" id="phone">

<input placeholder="Adresse" id="adresse">

<input placeholder="Description intervention" id="desc">

<input placeholder="Prix €" id="prix">

<button onclick="ajouter()">Ajouter ligne</button>

<table id="table">
<tr>
<th>Description</th>
<th>Prix</th>
</tr>
</table>

<h3 id="total">Total : 0 €</h3>

<button onclick="pdf()">Créer PDF</button>

</section>

<script>

let total=0;

function ajouter(){

let desc=document.getElementById("desc").value;
let prix=parseFloat(document.getElementById("prix").value);

if(!desc || !prix) return;

let table=document.getElementById("table");

let row=table.insertRow();

row.insertCell(0).innerHTML=desc;
row.insertCell(1).innerHTML=prix+" €";

total+=prix;

document.getElementById("total").innerHTML="Total : "+total+" €";

}

function pdf(){

window.print();

}

</script>

</body>
</html>
